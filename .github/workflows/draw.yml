name: Draw Keymap
on:
  workflow_dispatch:
  push:
    paths:
      - 'config/keymap.keymap'
      - 'config/info.json'
      - 'config.yaml'

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 確実にPushするための権限を明示
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw
        run: |
          # 1. 解析（config.yamlが読み込まれているか、失敗しても続行）
          keymap -c config.yaml parse -z config/keymap.keymap > keymap_data.yaml || (cat config.yaml && exit 1)
          
          # 2. 描画
          keymap -c config.yaml draw -j config/info.json keymap_data.yaml > keymap_display.svg

      - name: Push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap_display.svg
          # 変更がある場合のみコミット
          git commit -m "Update keymap SVG" || exit 0
          git push
